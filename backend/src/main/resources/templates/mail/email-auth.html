<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Email Verification</title>
</head>
<body style="margin: 0; padding: 0; background-color: #F8FAFC;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #F8FAFC; padding: 60px 20px;">
    <tr>
        <td align="center">
            <div style="font-family: 'Pretendard', Arial, sans-serif; max-width: 540px; width: 100%; background-color: #ffffff; border: 1px solid #E2E8F0; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.03); text-align: left;">

                <div style="height: 6px; background: linear-gradient(90deg, #0F172A 0%, #38BDF8 100%);"></div>

                <div style="padding: 40px 32px;">
                    <div style="display: flex; align-items: center; margin-bottom: 32px;">
                        <div style="width: 32px; height: 32px; background-color: #0F172A; border-radius: 8px; text-align: center; line-height: 32px; color: #ffffff; font-weight: 900; font-size: 14px;">M</div>
                        <span style="font-size: 16px; font-weight: 800; color: #0F172A; margin-left: 8px; tracking-tight: -0.5px;">InterviewMate</span>
                    </div>

                    <h2 style="color: #0F172A; font-weight: 900; font-size: 26px; margin: 0 0 10px 0; tracking-tight: -1px; line-height: 1.3;">
                        합격을 향한 첫걸음,<br/>
                        <span style="border-b: 3px solid #0F172A; padding-bottom: 2px;">이메일 인증을 완료하세요! 🚀</span>
                    </h2>
                    <p style="color: #64748B; font-size: 14px; font-weight: 600; margin: 0 0 36px 0; line-height: 1.5;">
                        안녕하세요! 서비스 이용을 위해 안전한 가인 가드를 수립 중입니다.<br/>
                        아래의 6자리 인증번호를 화면 입력창에 정확히 입력해 주세요.
                    </p>

                    <div style="background-color: #0F172A; border-radius: 16px; padding: 32px 24px; text-align: center; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); margin-bottom: 36px;">
                        <div style="color: #94A3B8; font-size: 11px; font-weight: 800; tracking-wider: 1.5px; margin-bottom: 12px; text-transform: uppercase;">Verification Code</div>
                        <span style="font-size: 38px; font-weight: 900; color: #38BDF8; letter-spacing: 8px; font-family: 'Courier New', Courier, monospace; text-shadow: 0 0 12px rgba(56, 189, 248, 0.3);" th:text="${verificationCode}">000000</span>
                    </div>

                    <div style="border-top: 1px solid #F1F5F9; padding-top: 24px;">
                        <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="width: 100%;">
                            <tr>
                                <td>
                                    <p style="color: #EF4444; font-size: 12px; font-weight: 700; margin: 0 0 6px 0; display: flex; align-items: center;">
                                        ⚠️ 인증 유효 기한: 발송 시점으로부터 딱 3분
                                    </p>
                                    <p style="color: #94A3B8; font-size: 12px; font-weight: 500; margin: 0; line-height: 1.5;">
                                        시간이 만료된 경우 화면의 '재발송하기' 버튼을 눌러주세요.<br/>
                                        본인이 요청하지 않은 가입 시도라면 이 메일을 무시하셔도 안전합니다.
                                    </p>
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>

                <div style="background-color: #F8FAFC; border-top: 1px solid #E2E8F0; padding: 20px 32px; text-align: center;">
                    <p style="color: #94A3B8; font-size: 11px; font-weight: 600; margin: 0;">&copy; 2026 InterviewMate. All rights reserved.</p>
                </div>
            </div>
        </td>
    </tr>
</table>
</body>
</html>

spring.application.name=backend

server.port=${SERVER_PORT:8080}
server.tomcat.connection-timeout=1800000
server.tomcat.keep-alive-timeout=1800000
server.forward-headers-strategy=native

frontend_base_url=${front_base_url}

spring.datasource.url=jdbc:postgresql://localhost:5433/ai_interview_platform
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=admin
spring.datasource.password=admin1234

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.ai.openai.api-key=${openAi_apiKey}
spring.ai.openai.chat.options.model=gpt-4o-mini

spring.security.oauth2.client.registration.google.client-id=${google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${google_client_secret}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.naver.client-id=${naver_client_id}
spring.security.oauth2.client.registration.naver.client-secret=${naver_client_secret}
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image
spring.security.oauth2.client.registration.naver.client-name=Naver

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-info-authentication-method=header
spring.security.oauth2.client.provider.naver.user-name-attribute=response

spring.security.user.name=disabled
spring.security.user.password=disabled

spring.mail.host=${naver_smtp_host}
spring.mail.port=${naver_smtp_port}
spring.mail.username=${naver_smtp_username}
spring.mail.password=${naver_smtp_password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.naver.com
spring.mail.properties.mail.smtp.ssl.enable=true

spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true

# prod 프로필이 켜질 때 oauth 프로필도 세트로 같이 켜지도록 그룹화
spring.profiles.group.prod=prod,oauth

logging.level.org.hibernate.SQL=info
logging.level.org.hibernate.orm.jdbc.bind=info
logging.level.org.springframework.security=info

jwt.secret=${JWT_SECRET:u59D6p8vB2N+z7kR/X9m4L0S6aJqW3E5Y7H1GzV8X9I=}
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000

cloud.aws.s3.bucket=${AWS_S3_BUCKET}
cloud.aws.credentials.instanceProfile=true
cloud.aws.stack.auto=false

spring.servlet.multipart.file-size-threshold=5MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
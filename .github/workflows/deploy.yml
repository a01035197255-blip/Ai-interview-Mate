name: Deploy to EB

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build -x test

      - name: Generate deployment package
        run: |
          cp build/libs/*.jar ./application.jar
          mkdir -p .platform/nginx/conf.d
          cat << 'EOF' > .platform/nginx/conf.d/timeout.conf
          proxy_connect_timeout 180s;
          proxy_send_timeout 180s;
          proxy_read_timeout 180s;
          EOF
          mkdir -p .ebextensions
          cat << 'EOF' > .ebextensions/alb-timeout.config
          option_settings:
            aws:elbv2:loadbalancer:
              IdleTimeout: 180
          EOF
          zip -r deploy.zip application.jar .platform .ebextensions
          zipinfo deploy.zip

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: InterviewMate
          environment_name: InterviewMate-backend-prod
          region: ap-northeast-2
          version_label: ver-${{ github.run_number }}
          deployment_package: backend/deploy.zip